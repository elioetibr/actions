# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecov-yaml
# Validate: curl -X POST --data-binary @codecov.yml https://codecov.io/validate

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: '90...100' # red below 90, green at/above 100

  status:
    project:
      default:
        target: 95% # must stay at or above 95% total
        threshold: 1% # allow 1% slippage on a single PR
        base: auto
        if_ci_failed: error
        only_pulls: false
      libs:
        target: 100% # foundation must stay at 100%
        threshold: 0%
        paths:
          - src/libs/
      actions:
        target: 95%
        threshold: 1%
        paths:
          - src/actions/
      tools:
        target: 95%
        threshold: 1%
        paths:
          - src/tools/

    patch:
      default:
        target: 90% # new code in PRs may be slightly under project target
        threshold: 5%
        base: auto
        if_ci_failed: error

    changes: false # don't fail when unchanged-file totals shift

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 1%
  individual_components:
    - component_id: libs
      name: Shared Libraries
      paths:
        - src/libs/**
    - component_id: actions
      name: Action Implementations
      paths:
        - src/actions/**
    - component_id: tools
      name: Tool Runners
      paths:
        - src/tools/**
    - component_id: agents
      name: CI/CD Agent Abstraction
      paths:
        - src/agents/**

# Paths excluded from coverage calculation.
# Matches the same exclusions we apply in scripts/lcov-summary.ts.
ignore:
  - 'dist/**'
  - 'coverage/**'
  - 'node_modules/**'
  - '__mocks__/**'
  - 'scripts/**'
  - '**/examples/**'
  - '**/interfaces/**'
  - '**/index.ts' # barrel files are re-exports only
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - 'src/test-preload.ts'
  - 'src/agents/**' # built separately by Vite, not unit-tested

comment:
  layout: 'header, diff, components, files, footer'
  behavior: default
  require_changes: false # comment on every PR even if coverage unchanged
  require_base: false # post even if base coverage is unknown
  require_head: true
  show_carryforward_flags: true

# Flags let multiple jobs upload partial coverage and have it merged.
# Today we have a single upload from `build`; flags are ready for
# future expansion (e.g. e2e tests, integration suites).
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 1%
  individual_flags:
    - name: unit
      paths:
        - src/**
      carryforward: true

# GitHub PR-status integration
github_checks:
  annotations: true
